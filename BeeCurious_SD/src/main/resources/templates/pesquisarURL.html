<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Verificar Link</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 50px;
      background-color: #f8f9fa;
    }
    h1 {
      color: #B36036; /* Castanho para o título */
      margin-bottom: 30px;
    }
    input[type="url"] {
      width: 60%;
      padding: 12px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #d4a373; /* Borda em tom de castanho claro */
      outline: none;
      transition: border 0.3s;
    }
    input[type="url"]:focus {
      border: 2px solid #B36036; /* Castanho quando em foco */
    }
    button {
      background-color: #FFFF99;
      border: 1px solid #d1d5da;
      border-radius: 4px;
      color: #2c3e50;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    button:hover {
      background-color: #f5e769; /* Amarelo mais escuro no hover */
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    form {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
  </style>
</head>
<body>
<h1>Introduza o link para verificar se existem páginas que apontam para ele</h1>
<form action="/results_url" method="GET">
  <input type="url" name="url" placeholder="Insere o link..." required>
  <button type="submit">Verificar</button>
</form>
</body>
</html>
