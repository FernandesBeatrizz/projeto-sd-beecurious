<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stop Words</title>
  <style>
    body {
      text-align: center; /* Centraliza todo o conteúdo */
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      color: #FFFF99; /* Amarelo mais forte */
      text-shadow:
              -1px -1px 0 #000,
              1px -1px 0 #000,
              -1px 1px 0 #000,
              1px 1px 0 #000;
      font-size: 2.5em; /* Título maior */
      margin-bottom: 30px;
    }

    p {
      color: #fffacd; /* Amarelo pastel */
      text-shadow:
              -1px -1px 0 #000,
              1px -1px 0 #000,
              -1px 1px 0 #000,
              1px 1px 0 #000;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 5px;
      display: inline-block;
      max-width: 80%;
      margin: 0 auto 40px; /* Espaço extra abaixo */
    }

    a {
      background-color: #FFFF99;
      border: 1px solid #d1d5da;
      border-radius: 4px;
      max-width: 200px;
      color: #2c3e50;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    a:hover {
      background-color: #FFFF99; /* Amarelo mais forte ao passar o mouse */
    }
  </style>
</head>
<body>
<h1>Lista de Stop Words</h1>
<p th:text="${stopwords}">[Consulta das stop words]</p>
<a href="/">Voltar à página principal</a>
</body>
</html>
