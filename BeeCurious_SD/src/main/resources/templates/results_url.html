<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Resultado</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 50px;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .result-container {
            background-color: #FFFF99;
            padding: 30px;
            border-radius: 15px;
            width: fit-content;
            max-width: 80%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .result-content {
            background-color: white;
            word-break: break-all;
            padding: 25px;
            border-radius: 10px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.05);
        }
        h2, h3 {
            color: #B36036FF; /* Cor B36036FF para títulos */
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        p {
            color: #333;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="result-container">
    <div class="result-content" id="resultado">
        <h2>Resultado para: <span th:text="${url}"></span></h2>

        <div th:if="${encontrado}">
            <h3>Link Encontrado!</h3>
            <ul>
                <li th:each="link : ${ligacoes}" th:text="${link}"></li>
            </ul>
        </div>

        <div th:if="${!encontrado}">
            <h3>Link não encontrado</h3>
            <p>O link <span th:text="${url}"></span> não tem páginas a apontar para ele.</p>
        </div>

        <div th:if="${mensagem}">
            <p th:text="${mensagem}"></p>
        </div>
    </div>
</div>
</body>
</html>
