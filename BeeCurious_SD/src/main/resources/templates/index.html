<!DOCTYPE html>
<html lang="pt" xmlns="http://www.w3.org/1999/html">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Googol - Motor de Pesquisa</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background-color: #f8f9fa;
      color: #333;
    }

    .container {
      margin-top: 50px;
    }

    .logo-container {
      margin-bottom: 30px;
    }

    .logo-image {
      max-width: 300px;
      height: auto;
    }

    .search-container {
      width: 580px;
      margin: 0 auto;
      position: relative;
    }

    .search-box {
      width: 100%;
      padding: 12px 20px;
      border: 1px solid #d1d5da;
      border-radius: 24px;
      font-size: 16px;
      outline: none;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .search-box:hover, .search-box:focus {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-color: #a0a4a8;
    }

    .search-button {
      background-color: #f8f9fa;
      border: 1px solid #d1d5da;
      border-radius: 4px;
      color: #2c3e50;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: all 0.2s ease;
    }

    .search-button:hover {
      border-color: #a0a4a8;
      background-color: #e9ecef;
      color: #212529;
    }

    .buttons-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    .button-form {
      display: inline-block;
    }

    a .search-button {
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="logo-container">
    <img th:src="@{/images/LogoBeeCurious.svg}" alt="Logo">
  </div>

  <div class="search-container">
    <form action="/search" method="GET">
      <input type="text" class="search-box" name="q" placeholder="Pesquise no Googol..." autofocus>
    </form>
  </div>

  <div class="buttons-container">
    <form action="/pesquisarURL" method="GET" class="button-form">
      <button type="submit" class="search-button">Consultar ligações para uma página</button>
    </form>

    <a href="/stopwords" class="button-form">
      <button class="search-button">Consultar Stop Words</button>
    </a>

    <a href="/indexarURL" class="button-form">
      <button class="search-button">Indexar URL</button>
    </a>
  </div>
</div>
</body>
</html>
