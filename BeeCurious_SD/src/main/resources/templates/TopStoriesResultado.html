<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultado da Indexação</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
        }

        .header {
            background-color: #B36036;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
        }

        .logo {
            height: 90px;
            margin-right: 15px;
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #B36036;
        }

        .btn {
            padding: 10px 20px;
            background-color: #B36036;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<!-- Cabeçalho -->
<div class="header">
    <div class="header-container">
        <a href="/" class="logo">
            <img src="/images/LogoBeeCurious.svg" alt="Logo" style="height:100%;">
        </a>
    </div>
</div>

<!-- Conteúdo principal -->
<div class="container">
    <h2 th:text="${mensagem}">Mensagem de indexação</h2>
    <a href="/" class="btn">Voltar à página inicial</a>
</div>
</body>
</html>
