<!-- link.html -->
<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Verificar Link</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f0f2f5; }
    input[type="url"] {
      width: 60%; padding: 10px; font-size: 16px; border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 20px; font-size: 16px; margin-left: 10px; border-radius: 5px;
      border: none; background-color: #2c3e50; color: white; cursor: pointer;
    }
    button:hover { background-color: #34495e; }
  </style>
</head>
<body>
<h1>Verificar se o link foi indexado</h1>
<form action="link_result.html" method="GET">
  <input type="url" name="url" placeholder="Insere o link..." required>
  <button type="submit">Verificar</button>
</form>
</body>
</html>
